# Root mise config — orchestrates docs and per-platform tasks, and pins the
# few project-wide tools. Per-platform toolchains live in their own mise.toml
# under apps/<platform>/ and services/<service>/, created when you scaffold that
# platform:
#   web / website / cli  → node, pnpm        ios → swift, tuist
#   android              → jdk, kotlin       windows → dotnet
#   tui / linux          → rust, cargo       convex → node, pnpm
#
# Environment variables are managed by Varlock: the committed `.env.schema`
# (repo root) is the typed contract; real values live in `.env` / `.env.local`
# (gitignored). Run env-dependent commands through `varlock run -- <cmd>`, or
# wire Varlock into a platform's mise task. See https://varlock.dev.
#
# When you scaffold a platform, add its root orchestration task here (e.g.
# `web:dev`, `ios:test`) so cross-platform commands work from the repo root.
#
# Run `mise tasks` from any directory to see what's available.

[settings]
experimental = true

[tools]
node = "24"
pnpm = "11"
"npm:oxfmt" = "latest"
"npm:varlock" = "latest"

[env]
# VitePress tooling installs at the repo root so markdown rendered via `srcDir`
# (specs/, features/, STACK.md) can resolve vue/vitepress during the build.
_.path = ['{{config_root}}/node_modules/.bin']

[hooks]
postinstall = "pnpm install"

[tasks.fmt]
description = "Format the entire project"
run = "oxfmt"

[tasks."docs:dev"]
description = "Run the docs site (VitePress) dev server"
run = "vitepress dev docs"

[tasks."docs:build"]
description = "Build the static docs site"
run = "vitepress build docs"

[tasks."docs:preview"]
description = "Preview the built docs site locally"
depends = ["docs:build"]
run = "vitepress preview docs"
